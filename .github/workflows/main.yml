                    const seed = fp.noise[0] * 0.001;
                    for (let i = 0; i < arr.length; i++) {
                      arr[i] += seed;
                    }
                  };
                }

                // Keep dismissing the Zedge data collection/privacy popup whenever it appears.
                (() => {
                  if (window.__zedgePrivacyPopupWatcherInstalled) return;
                  window.__zedgePrivacyPopupWatcherInstalled = true;

                  const overlaySelectors = [
                    '[class*="consent"]',
                    '[class*="cookie"]',
                    '[class*="privacy"]',
                    '[class*="notice"]',
                    '[id*="consent"]',
                    '[id*="cookie"]',
                    '[id*="privacy"]'
                  ];

                  const buttonHints = ['close', 'dismiss', 'got it', 'ok', 'accept', 'agree'];

                  const tryDismiss = () => {
                    // ── 1. Try main document overlays (consent/cookie/privacy only) ──
                    const overlays = [...document.querySelectorAll(overlaySelectors.join(', '))];

                    for (const overlay of overlays) {
                      // Skip Zedge's own workflow dialogs
                      if (overlay.querySelector('[data-hook]') || overlay.closest('[data-hook]')) continue;
                      // Skip any overlay containing form inputs (upload/login forms)
                      if (overlay.querySelector('input[type="file"], input[type="email"], input[type="password"], textarea')) continue;

                      const buttons = [...overlay.querySelectorAll('button, [role="button"], a')];
                      const closeButton = buttons.find(btn => {
                        const label = `${btn.textContent || ''} ${btn.getAttribute('aria-label') || ''} ${btn.getAttribute('title') || ''}`.toLowerCase();
                        return buttonHints.some(hint => label.includes(hint));
                      });

                      if (closeButton) {
                        closeButton.click();
                        return true;
                      }
                    }

                    // ── 2. Try consent iframes only ──
                    const consentKW = ['consent', 'cookie', 'privacy', 'onetrust', 'cookiebot', 'quantcast', 'sourcepoint', 'cmp'];
                    const iframes = [...document.querySelectorAll('iframe')];
                    for (const iframe of iframes) {
                      try {
                        const src = (iframe.src || '').toLowerCase();
                        if (!consentKW.some(k => src.includes(k))) continue;

                        const iDoc = iframe.contentDocument;
                        if (!iDoc) continue;
                        const iframeOverlays = iDoc.querySelectorAll(
                          '[class*="consent"], [class*="cookie"], [class*="privacy"], [id*="consent"], [id*="cookie"]'
                        );
                        for (const ov of iframeOverlays) {
                          const iButtons = [...ov.querySelectorAll('button, [role="button"], a')];
                          const closeBtn = iButtons.find(b => {
                            const l = `${b.textContent || ''} ${b.getAttribute('aria-label') || ''} ${b.getAttribute('title') || ''}`.toLowerCase();
                            return buttonHints.some(h => l.includes(h));
                          });
                          if (closeBtn) { closeBtn.click(); return true; }
                        }
                      } catch (e) {
                        // Cross-origin iframe — remove if consent-related
                        const src = (iframe.src || '').toLowerCase();
                        if (consentKW.some(k => src.includes(k))) {
                          iframe.remove();
                          document.body.style.overflow = '';
                          document.documentElement.style.overflow = '';
                          return true;
                        }
                      }
                    }

                    // ── 3. Force-remove any leftover overlay blocking the page ──
                    const blocked = document.querySelectorAll(
                      '[class*="consent"], [class*="cookie"], [class*="privacy"], [id*="consent"], [id*="cookie"]'
                    );
                    for (const el of blocked) {
                      if (!el.querySelector('[data-hook]') && !el.closest('[data-hook]')) {
                        el.remove();
                        document.body.style.overflow = '';
                        document.documentElement.style.overflow = '';
                        return true;
                      }
                    }

                    return false;
                  };

                  const start = () => {
                    tryDismiss();

                    const observer = new MutationObserver(() => {
                      tryDismiss();
                    });

                    observer.observe(document.documentElement, {
                      subtree: true,
                      childList: true,
                      attributes: true
                    });

                    setInterval(tryDismiss, 500);
                  };

                  if (document.documentElement) {
                    start();
                  } else {
                    document.addEventListener('DOMContentLoaded', start, { once: true });
                  }
                })();
              }, {
                hc:       fpHC,
                dm:       fpDM,
                sw:       fpVP.width,
                sh:       fpVP.height,
                noise:    fpNoise,
                vendor:   fpVendor,
                renderer: fpRenderer
              });

              const page = await context.newPage();

              await page.setExtraHTTPHeaders({
                "Accept-Language": "en-US,en;q=0.9"
