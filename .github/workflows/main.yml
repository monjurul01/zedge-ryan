                });
                if (removed > 0) {
                  document.body.style.overflow = '';
                  document.documentElement.style.overflow = '';
                }
                return removed;
              }).catch(() => {});
            } catch (e) { /* skip */ }

            return false;
          }

          async function autoKillConsent(page) {
            try {
              const frames = page.frames();
              for (const frame of frames) {
                try {
                  if (frame === page.mainFrame()) continue;
                  const url = (frame.url() || '').toLowerCase();
                  if (!url || url === 'about:blank') continue;
                  if (url.includes('zedge')) continue;
                  await frame.evaluate(() => {
                    const body = document.body;
                    if (!body) return;
                    const text = (body.textContent || '').toLowerCase();
                    const hasConsentText = text.includes('consent') || text.includes('cookie') || text.includes('privacy') || text.includes('agree') || text.includes('accept');
                    const hasButtons = document.querySelectorAll('button').length > 0;
                    if (hasConsentText || hasButtons) {
                      document.documentElement.remove();
                    }
                  }).catch(() => {});
                  await page.evaluate((frameUrl) => {
                    document.querySelectorAll('iframe').forEach(f => {
                      if (f.src && f.src.toLowerCase() === frameUrl) {
                        f.remove();
                      }
                    });
                  }, url).catch(() => {});
                  console.log(`Killed frame: ${url.slice(0, 60)}`);
