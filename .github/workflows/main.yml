              // 3. BrowserLeaks check ONCE
              console.log("Opening BrowserLeaks");
              await page.goto("https://browserleaks.com/ip", { waitUntil: "domcontentloaded" });
              await page.waitForLoadState("networkidle");
              await scrollFullPage(page);
              await page.evaluate(() => window.scrollTo(0, 0));

              // 4. Login ONCE
              console.log("Opening Zedge");
              await page.goto("https://upload.zedge.net", { waitUntil: "domcontentloaded" });
              await page.waitForLoadState("networkidle");
              await page.waitForTimeout(2000);
              await dismissConsentIframes(page);

              // Screenshot to capture exactly what the page shows before login attempt
              await page.screenshot({ path: "zedge-before-login.png", fullPage: true });
              console.log(`Page URL before login: ${page.url()}`);
              console.log(`Page title before login: ${await page.title()}`);

              // ── COMPREHENSIVE ONE-TIME PRE-LOGIN MODAL / POPUP KILLER ──────
              // Runs ONLY on the initial Zedge page load before login.
              // We check in a loop for up to 8 seconds to handle dynamic/delayed popups,
              // then exit permanently. This ensures we never interfere with subsequent
              // upload modals or automation dialogs during the actual run.
              // ────────────────────────────────────────────────────────────────
              console.log("Running pre-login modal/popup killer...");
              let modalDismissed = false;
              const killerStart = Date.now();
              const killerMaxWait = 8000; // 8 seconds max wait

              const modalSelectors = [
                'button:has-text("Close")',
                'button:has-text("Do not Share or Sell my Personal Information")',
                'button:has-text("Accept All Cookies")',
                'button:has-text("Accept All")',
                'button:has-text("Accept")',
                'button:has-text("I Agree")',
                'button:has-text("Agree")',
                'button:has-text("OK")',
                'button:has-text("Got it")',
                'button:has-text("Dismiss")',
                '[role="dialog"] button:has-text("Close")',
                '[role="alertdialog"] button:has-text("Close")',
              ];

              while (Date.now() - killerStart < killerMaxWait) {
                let clickedAny = false;
                for (const selector of modalSelectors) {
                  try {
                    const btn = page.locator(selector).first();
                    const visible = await btn.isVisible({ timeout: 200 }).catch(() => false);
                    if (visible) {
                      // Check if it's actually part of a privacy/consent overlay
                      const isConsentOverlay = await btn.evaluate(el => {
                        const inOverlay = el.closest(
                          '[class*="modal"], [class*="overlay"], [class*="consent"], ' +
                          '[class*="cookie"], [class*="privacy"], [class*="popup"], ' +
                          '[class*="banner"], [class*="notice"], [class*="dialog"], ' +
                          '[id*="consent"], [id*="cookie"], [id*="privacy"], ' +
                          '[id*="modal"], [id*="popup"], [role="dialog"], [role="alertdialog"]'
                        );
                        return !!inOverlay;
                      }).catch(() => false);

                      if (isConsentOverlay) {
                        await btn.click({ timeout: 2000 });
                        console.log(`✅ Modal dismissed via: ${selector}`);
                        modalDismissed = true;
                        clickedAny = true;
                        break;
                      }
                    }
                  } catch (e) { /* ignore and try next */ }
                }

                if (clickedAny) {
                  await page.waitForTimeout(1000);
                  break; // exit loop if modal was dismissed
                }
                
                // Fallback check: look for iframe consent dialogs or overlays and remove them
                const nuked = await page.evaluate(() => {
                  let killed = 0;
                  // Remove any element that looks like a consent/privacy overlay/modal
                  const elements = document.querySelectorAll(
                    '[class*="consent"], [class*="cookie"], [class*="privacy"], ' +
                    '[class*="modal"]:not([data-hook]), [class*="popup"], ' +
                    '[id*="consent"], [id*="cookie"], [id*="privacy"]'
                  );
