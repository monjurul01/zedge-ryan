            await page.waitForTimeout(1000);

            await forceCheckByDataHook(page, "form-field-accept-input", "first ownership checkbox");
            await page.waitForTimeout(500);

            await forceCheckByDataHook(page, "form-field-acceptContentPolicy-input", "second content policy checkbox");
            await page.waitForTimeout(500);

            console.log("Waiting for file input");
            const fileInput = dialog
              .locator('input[data-hook="form-field-files-input"]')
              .first();

            await fileInput.waitFor({ state: "attached" });
            console.log("Uploading file");
            await fileInput.setInputFiles(localFile);

            await page.waitForFunction(() => {
              const input = document.querySelector('input[data-hook="form-field-files-input"]');
              return input && input.files && input.files.length > 0;
            });

            console.log("Waiting for Upload button to become enabled");
            const uploadButton = dialog
              .locator('button[type="submit"]:has-text("Upload")')
              .first();

            await uploadButton.waitFor({ state: "visible" });
            await scrollToElement(uploadButton);

            await page.waitForFunction(() => {
              const buttons = [...document.querySelectorAll('button[type="submit"]')];
              const upload = buttons.find(btn => btn.textContent.trim() === "Upload");
              return upload && upload.disabled === false;
            });

            await uploadButton.click();

            console.log("Waiting for Edit meta button");
            const editMetaButton = page
              .locator('[role="dialog"] button:has-text("Edit meta")')
              .first();

            await editMetaButton.waitFor({ state: "visible" });

            await page.waitForFunction(() => {
              const buttons = [...document.querySelectorAll("button")];
              const editMeta = buttons.find(btn => btn.textContent.trim() === "Edit meta");
              return editMeta && editMeta.disabled === false;
            });

            await scrollToElement(editMetaButton);
            await editMetaButton.click();
            console.log("Clicked Edit meta");
          }

          async function fillMetaDialog(page, meta) {
            console.log("Waiting for meta dialog to open");

            await page.waitForSelector(
              'input[data-hook="form-field-name-input"]',
              { state: "visible", timeout: 30000 }
            );

            await page.waitForTimeout(800);

            // ── TITLE ──────────────────────────────────────────────
            console.log("Filling title");
            const titleInput = page.locator('input[data-hook="form-field-name-input"]').first();
            await titleInput.waitFor({ state: "visible" });
            await scrollToElement(titleInput);
            await titleInput.click();
            
            const title = String(meta.title || "").slice(0, 30);
            await titleInput.fill(title);
            await titleInput.press('Tab'); 
            await page.waitForTimeout(300);
            console.log(`Title filled: "${title}"`);

            // ── TAGS ───────────────────────────────────────────────
            if (meta.tags) {
              const tagList = String(meta.tags)
                .split(",")
                .map(t => t.trim())
                .filter(Boolean)
                .filter(t => t.length >= 2)
                .slice(0, 10);

              console.log(`Filling ${tagList.length} valid tags`);
              
              const tagsInput = page.locator('.react-select__input').nth(0);

              for (const tag of tagList) {
                await tagsInput.waitFor({ state: "attached" });
                await scrollToElement(tagsInput);
                await tagsInput.click({ force: true });
                await tagsInput.fill(tag);
                await page.waitForTimeout(300);
                await tagsInput.press("Enter");
                await page.waitForTimeout(200);
                console.log(`Tag added: "${tag}"`);
              }
              await tagsInput.press('Tab');
            }

            // ── CATEGORY ───────────────────────────────────────────
            if (meta.category) {
              console.log(`Filling category: "${meta.category}"`);
              
              const categoryInput = page.locator('.react-select__input').nth(1);
              
              await categoryInput.waitFor({ state: "attached" });
              await scrollToElement(categoryInput);
              await categoryInput.click({ force: true });
              
              await categoryInput.fill(String(meta.category));
              await page.waitForTimeout(500);

              await categoryInput.press("Enter");
              await categoryInput.press('Tab');
              console.log(`Category selected: "${meta.category}"`);
            }

            // ── DESCRIPTION ────────────────────────────────────────
            if (meta.description) {
              console.log("Filling description");
              const descInput = page.locator('textarea[data-hook="form-field-description-input"]').first();
              await descInput.waitFor({ state: "visible" });
              await scrollToElement(descInput);
              await descInput.click();
              
              const desc = String(meta.description || "").slice(0, 200);
              await descInput.fill(desc);
              
              await descInput.press('Tab');
              await page.waitForTimeout(300);
              console.log(`Description filled`);
            }

            // ── VIDEO AD RADIO BUTTON ──────────────────────────────
            console.log("Scrolling to lock type section");

            await page.waitForSelector(
              'input[name="lockType"]',
              { state: "attached", timeout: 15000 }
            );

            await page.evaluate(() => {
              const wrappers = [...document.querySelectorAll('input[name="lockType"]')];
              const videoAdRadio = wrappers.find(input => {
                const container = input.closest('.sc-fHsOPI') || input.parentElement;
                return container && container.textContent.includes("Video ad");
              });

              if (!videoAdRadio) throw new Error("Video ad radio button not found");

              videoAdRadio.scrollIntoView({ block: "center" });
              videoAdRadio.click();

              videoAdRadio.dispatchEvent(new Event("change", { bubbles: true }));
            });

            await page.waitForTimeout(500);

            const videoAdSelected = await page.evaluate(() => {
              const wrappers = [...document.querySelectorAll('input[name="lockType"]')];
              const videoAdRadio = wrappers.find(input => {
                const container = input.closest('.sc-fHsOPI') || input.parentElement;
                return container && container.textContent.includes("Video ad");
              });
              return videoAdRadio ? videoAdRadio.checked : false;
            });

            if (!videoAdSelected) {
              console.log("Video ad not selected via JS click — trying Playwright locator");

              const videoAdWrapper = page
                .locator('.sc-fHsOPI')
                .filter({ hasText: "Video ad" })
                .first();

              await scrollToElement(videoAdWrapper);
              const radioInWrapper = videoAdWrapper.locator('input[type="radio"]').first();
              await radioInWrapper.click({ force: true });
              await page.waitForTimeout(400);
            }

            console.log("Video ad radio selected");

