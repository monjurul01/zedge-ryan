              .filter({ hasText: /^Publish$/ })
              .first();

            await publishButton.waitFor({ state: "visible", timeout: 15000 });
            await scrollToElement(publishButton);
            await page.waitForTimeout(300);
            await publishButton.click();

            console.log("Clicked Publish");
          }

          async function verifyPublishStatus(page) {
            console.log("Waiting 5 seconds before checking status...");
            await page.waitForTimeout(5000);

            let attempts = 0;
            const maxAttempts = 50;

            while (attempts < maxAttempts) {
              attempts++;
              console.log(`Reloading page to fetch latest server status (Attempt ${attempts}/${maxAttempts})...`);
              
              await page.reload({ waitUntil: "domcontentloaded" });
              
              try {
                await page.waitForSelector('span[type="INFO"], span[type="SUCCESS"], span.sc-jtJlRs', { state: 'attached', timeout: 15000 });
                await page.waitForTimeout(1000);
              } catch (e) {
                console.log("Warning: Badges didn't load in time after refresh. Network might be slow.");
              }

              const pending = page.locator('span').filter({ hasText: /^PENDING$/ }).first();
              const published = page.locator('span').filter({ hasText: /^PUBLISHED$/ }).first();
              const inReview = page.locator('span').filter({ hasText: /^IN REVIEW$/i }).first();
              const rejected = page.locator('span').filter({ hasText: /^REJECTED$/i }).first();

              if (await published.isVisible()) {
                console.log("Status confirmed: PUBLISHED! Excellent. Stopping checks.");
                return { removed: false, statusName: "PUBLISHED" };
              }

              if (await pending.isVisible() || await inReview.isVisible() || await rejected.isVisible()) {
                let statusName = "PENDING";
                if (await inReview.isVisible()) statusName = "IN REVIEW";
                else if (await rejected.isVisible()) statusName = "REJECTED";

                console.log(`Status is ${statusName}. Initiating removal process...`);

                const ellipsisBtn = page.locator('button:has(svg[data-icon="ellipsis-h"])').first();
                await scrollToElement(ellipsisBtn);
                await ellipsisBtn.click();
                console.log("Clicked ellipsis menu");
                await page.waitForTimeout(1000);

                const removeBtn = page.locator('button').filter({ hasText: /^Remove$/ }).first();
                await removeBtn.waitFor({ state: "visible" });
                await removeBtn.click();
                console.log("Clicked Remove dropdown option");

                const confirmBtn = page.locator('button[data-hook="z-modal-submit"]');
                await confirmBtn.waitFor({ state: "visible" });
                await confirmBtn.click();
                console.log("Confirmed deletion on modal.");
                
                await page.waitForTimeout(2000);

                // Return result instead of throwing — so the upload loop can still count this as an attempt
                return { removed: true, statusName };
              }

              console.log("No recognizable status badge found yet. Could be loading or lost context...");
              await page.waitForTimeout(20000);
            }
            
            console.log("Warning: Status check timed out. Proceeding anyway.");
            return { removed: false, statusName: "UNKNOWN" };
          }

          // ── Dismiss consent/privacy modals inside iframes ──────────────
          async function dismissConsentIframes(page) {
            const consentKeywords = ['consent', 'cookie', 'privacy', 'cmp', 'onetrust', 'cookiebot', 'quantcast', 'sourcepoint', 'trustarc', 'didomi'];
            const frames = page.frames();
            for (const frame of frames) {
              try {
                if (frame === page.mainFrame()) continue;
                const url = (frame.url() || '').toLowerCase();
                if (!url || url === 'about:blank') continue;

                // Only process frames whose URL clearly belongs to a consent provider
                const isConsentFrame = consentKeywords.some(k => url.includes(k));
                if (!isConsentFrame) continue;

                console.log(`Found consent iframe: ${frame.url()}`);

                const agreeBtn = frame.locator('button:has-text("Agree")').last();
                if (await agreeBtn.isVisible({ timeout: 2000 }).catch(() => false)) {
                  await agreeBtn.click({ timeout: 5000 }).catch(() => {});
                  console.log("Clicked 'Agree' in consent iframe");
                  await page.waitForTimeout(1500);
                  return true;
                }

                const acceptBtn = frame.locator('button:has-text("Accept")').last();
                if (await acceptBtn.isVisible({ timeout: 1000 }).catch(() => false)) {
                  await acceptBtn.click({ timeout: 5000 }).catch(() => {});
                  console.log("Clicked 'Accept' in consent iframe");
                  await page.waitForTimeout(1500);
                  return true;
                }

                const closeBtn = frame.locator('[aria-label*="close" i], [title*="close" i]').first();
                if (await closeBtn.isVisible({ timeout: 1000 }).catch(() => false)) {
                  await closeBtn.click({ timeout: 5000 }).catch(() => {});
                  console.log("Clicked close in consent iframe");
                  await page.waitForTimeout(1500);
                  return true;
                }
              } catch (e) { /* skip frame */ }
            }

            // Fallback: check main page for consent modal ONLY (not upload dialogs)
            try {
              const mainConsent = page.locator('[class*="consent"] button:has-text("Agree"), [class*="cookie"] button:has-text("Agree"), [id*="consent"] button:has-text("Agree"), [id*="cookie"] button:has-text("Agree")').first();
              if (await mainConsent.isVisible({ timeout: 2000 }).catch(() => false)) {
                await mainConsent.click({ timeout: 5000 }).catch(() => {});
                console.log("Clicked 'Agree' on main page consent modal");
                await page.waitForTimeout(1500);
                return true;
              }
            } catch (e) { /* skip */ }

            // Last resort: force-remove consent iframes only
            try {
              await page.evaluate(() => {
                let removed = 0;
                document.querySelectorAll('iframe').forEach(iframe => {
                  const src = (iframe.src || '').toLowerCase();
                  const id = (iframe.id || '').toLowerCase();
                  const cls = (iframe.className || '').toLowerCase();
                  if (src.includes('consent') || src.includes('cookie') || src.includes('privacy') || src.includes('cmp') || src.includes('onetrust') || src.includes('sourcepoint') || src.includes('quantcast') || src.includes('cookiebot') || id.includes('consent') || cls.includes('consent')) {
                    iframe.remove();
                    removed++;
                  }
                });
                if (removed > 0) {
                  document.body.style.overflow = '';
                  document.documentElement.style.overflow = '';
                }
                return removed;
              }).catch(() => {});
            } catch (e) { /* skip */ }

            return false;
          }

