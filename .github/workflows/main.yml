          async function waitForConsentClear(page, maxWait = 5000) {
            const start = Date.now();
            while (Date.now() - start < maxWait) {
              await autoKillConsent(page);
              const hasConsent = await page.evaluate(() => {
                const isVisible = (el) => {
                  if (!el) return false;
                  const style = window.getComputedStyle(el);
                  if (!style || style.display === 'none' || style.visibility === 'hidden' || style.opacity === '0') return false;
                  const rect = el.getBoundingClientRect();
                  return rect.width > 40 && rect.height > 40;
                };
                const looksBlocking = (el) => {
                  if (!el) return false;
                  if (el.closest('[data-hook]')) return false;
                  if (!isVisible(el)) return false;
                  const style = window.getComputedStyle(el);
                  const isFixed = style.position === 'fixed';
                  const isAbsolute = style.position === 'absolute';
                  const highZ = parseInt(style.zIndex || '0', 10) > 100;
                  const isDialog = el.matches('[role="dialog"], [role="alertdialog"]');
                  if (!(isFixed || (isAbsolute && highZ) || isDialog)) return false;
                  const text = (el.textContent || '').toLowerCase();
                  return [
                    'consent', 'cookie', 'privacy', 'agree', 'accept', 'allow',
                    'close', 'dismiss', 'not now', 'no thanks', 'skip', 'got it'
                  ].some(k => text.includes(k));
                };

                const iframes = document.querySelectorAll('iframe');
                for (const f of iframes) {
                  if (!f.src.includes('zedge')) return true;
                }
                const overlays = document.querySelectorAll(
                  '[role="dialog"], [role="alertdialog"], ' +
                  '[class*="consent"], [class*="cookie"], [class*="privacy"], ' +
                  '[class*="modal"], [class*="popup"], [class*="overlay"], ' +
                  '[class*="banner"], [class*="notice"]'
                );
                for (const o of overlays) {
                  if (looksBlocking(o)) return true;
                }
                return false;
              }).catch(() => false);
              if (!hasConsent) return true;
              await page.waitForTimeout(300);
            }
            return false;
          }

