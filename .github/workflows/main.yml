                console.log(`========================================`);

                try {
                  queueItem = await getNextWallpaperFromRealtimeDB();
                } catch (e) {
                  console.log(`Queue is empty after ${successCount} upload(s). Stopping loop.`);
                  break;
                }

                try {
                  console.log("Navigating to Zedge upload portal");
                  await page.goto("https://upload.zedge.net", { waitUntil: "domcontentloaded" });
                  await page.waitForLoadState("networkidle");
                  await waitForConsentClear(page);

                  console.log("Clicking Profiles tab");
                  const profilesSelectors = [
                    'a:has-text("Profiles")',
                    'text=Profiles',
                    '[role="tab"]:has-text("Profiles")',
                    'a[href*="profile"]',
                    'button:has-text("Profiles")',
                  ];
                  let profilesClicked = false;
                  for (const sel of profilesSelectors) {
                    try {
                      const el = page.locator(sel).first();
                      if (await el.isVisible({ timeout: 8000 })) {
                        await el.click();
                        console.log(`Clicked Profiles via: ${sel}`);
                        profilesClicked = true;
                        break;
                      }
                    } catch (e) { }
                  }
                  if (!profilesClicked) {
                    await page.screenshot({ path: "profiles-not-found.png", fullPage: true });
                    throw new Error("Profiles tab not found after trying all selectors. Check profiles-not-found.png");
                  }
                  await page.waitForTimeout(2000);
                  await waitForConsentClear(page, 8000);

                  console.log("Clicking profile index: " + currentProfileIndex);
                  await safeClick(
                    page.locator('[data-hook="profile-list"] > div').nth(currentProfileIndex),
                    `Profile Index ${currentProfileIndex}`
                  );
                  await page.waitForTimeout(2000);
                  await waitForConsentClear(page, 8000);

                  await page.waitForLoadState("networkidle");
                  await page.waitForTimeout(1500);
                  await waitForConsentClear(page);

                  const profilePageUrl = page.url();
                  const profileBase    = profilePageUrl.replace(/\/content\/[^\/].*$/, "");
                  const targetType     = queueItem.isMp3 ? "AUDIO" : "WALLPAPER";
                  const targetContentUrl = `${profileBase}/content/${targetType}`;
                  console.log(`Navigating directly to ${targetType} page: ${targetContentUrl}`);
                  await page.goto(targetContentUrl, { waitUntil: "domcontentloaded" });
                  await page.waitForLoadState("networkidle");
                  await page.waitForTimeout(1000);
                  await autoKillConsent(page);

                  await safeClick(
                    page.locator("svg.fa-plus").first(),
                    "Upload plus icon"
                  );

                  await page.waitForTimeout(800);
                  await autoKillConsent(page);
                  await page.screenshot({ path: `zedge-upload-menu-${uploadNum}.png`, fullPage: false });

                  await uploadWallpaperInDialog(page, queueItem.localFile);

                  await fillMetaDialog(page, {
                    title:       queueItem.title,
                    tags:        queueItem.tags,
                    category:    queueItem.category,
                    description: queueItem.description
                  });
                  await autoKillConsent(page);

                  const publishResult = await verifyPublishStatus(page);
                  await autoKillConsent(page);

                  await page.screenshot({ path: `zedge-final-${uploadNum}.png`, fullPage: true });

                  const uploadedType = queueItem.isMp3 ? "ringtone" : "wallpaper";
                  await markWallpaperDoneAndDelete(queueItem.id, queueItem.name, uploadedType, queueItem.r2Urls || []);
                  await updateProfileStateAfterUpload(currentState, currentProfileIndex);

                  const profileUploadCounts = { ...(currentState.profileUploadCounts || {}) };
                  profileUploadCounts[currentProfileIndex] = (profileUploadCounts[currentProfileIndex] || 0) + 1;
                  currentState = {
                    ...currentState,
                    totalUploadsToday: currentState.totalUploadsToday + 1,
                    lastUsedProfileIndex: currentProfileIndex,
                    profileUploadCounts
                  };

                  successCount++;

                  const folderLabel = process.env.FOLDER_NAME || "Zedge Bot";
                  let notifyMsg = "";
                  if (publishResult.removed) {
                    notifyMsg = `⚠️ [${folderLabel}] Zedge Upload Alert!\n\nFile: ${queueItem.name}\nTitle: ${queueItem.title || "N/A"}\nCategory: ${queueItem.category || "N/A"}\nStatus: ${publishResult.statusName}\nProfile Index: ${currentProfileIndex}\n\nNotice: This item has been auto-removed from Zedge.`;
                    console.log(`⚠️ Upload ${uploadNum} was removed from Zedge (Status: ${publishResult.statusName}). Counted as upload attempt. (${successCount} this run)`);
                  } else {
                    notifyMsg = `🚀 [${folderLabel}] Zedge Upload Success!\n\nFile: ${queueItem.name}\nTitle: ${queueItem.title || "N/A"}\nCategory: ${queueItem.category || "N/A"}\nStatus: ${publishResult.statusName}\nProfile Index: ${currentProfileIndex}`;
                    console.log(`✅ Upload ${uploadNum} complete! Status: ${publishResult.statusName}. (${successCount} this run)`);
                  }
                  await sendFacebookNotification(notifyMsg);

                } catch (uploadErr) {
                  console.error(`❌ Upload ${uploadNum} failed with a technical error: ${uploadErr.message}`);
                  if (queueItem?.id) {
                    await markWallpaperFailed(queueItem.id, uploadErr.message).catch(() => {});
                  }
                  await page.screenshot({ path: `zedge-error-upload-${uploadNum}.png`, fullPage: true }).catch(() => {});
                  console.log("Continuing to next upload despite error...");
                }

                currentProfileIndex = getNextAvailableProfile(currentProfileIndex, currentState.profileUploadCounts, TOTAL_PROFILES, perProfileLimit);
                if (currentProfileIndex === -1) {
                  console.log("All profiles have uploaded today. No further uploads this run.");
                  break;
                }

                if (i < remainingUploads - 1) {
                  console.log("Waiting 3 seconds before next upload...");
                  await page.waitForTimeout(3000);
                }
              }

              console.log(`\nRun complete. ${successCount} upload(s) succeeded.`);

              clearInterval(vpnCheck);
              clearInterval(consentBlocker);
              await context.close();
              await browser.close();

            } catch (err) {
              console.error("BOT FATAL ERROR:", err);
              if (context) await context.close().catch(() => {});
              if (browser) await browser.close().catch(() => {});
              process.exit(1);
            }
          })();
          '@ | Set-Content bot.js

      - name: Connect Proton VPN
        shell: bash
        run: |
          choco install openvpn -y --allow-empty-checksums
          OVPN_BIN="C:/Program Files/OpenVPN/bin/openvpn.exe"
          if [ ! -f "$OVPN_BIN" ]; then OVPN_BIN="C:/Program Files (x86)/OpenVPN/bin/openvpn.exe"; fi
          if [ ! -f "$OVPN_BIN" ]; then echo "OpenVPN binary not found"; exit 1; fi
          echo "OpenVPN: $OVPN_BIN"

          printf '%s\n%s' "$VPN_USERNAME" "$VPN_PASSWORD" > auth.txt

          printf '%s' "$VPN_CONFIG" > proton.ovpn
          sed -i 's/^auth-user-pass$/auth-user-pass auth.txt/' proton.ovpn

          log="$RUNNER_TEMP/vpn.log"
          "$OVPN_BIN" --config proton.ovpn --log "$log" &
          VPN_PID=$!
          echo $VPN_PID > vpn.pid
          echo "Waiting for VPN connection... (PID: $VPN_PID)"
          sleep 20
          if ! ps -p $VPN_PID > /dev/null 2>&1; then
            echo "OpenVPN exited prematurely. Log:"
            tail -30 "$log" 2>/dev/null
            exit 1
          fi
          echo "VPN connected successfully (PID: $VPN_PID)"
        env:
          VPN_CONFIG: ${{ secrets.VPN_CONFIG }}
          VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}

      - name: Run bot
        shell: pwsh
        env:
          ZEDGE_EMAIL: ${{ github.event.inputs.zedge_email }}
          ZEDGE_PASSWORD: ${{ github.event.inputs.zedge_password }}
          HEADLESS: ${{ github.event.inputs.headless }}
          TOTAL_PROFILES: ${{ github.event.inputs.total_profiles }}
          UA_GROUP: ${{ github.event.inputs.ua_group }}
          FOLDER_NAME: "Ryan"
          FB_APIKEY: AIzaSyA2fleTrPVIBz3plQcqg8gwCjYTeC8uSNc
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL_RYAN }}
          SCHEDULE_START: "1781913600000"
        run: node bot.js

