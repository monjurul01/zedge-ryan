              ).first();
              if (await closeBtn.isVisible().catch(() => false)) {
                const isWorkflow = await closeBtn.evaluate(e => !!e.closest('[data-hook]')).catch(() => true);
                if (!isWorkflow) {
                  await closeBtn.click({ timeout: 5000 }).catch(() => {});
