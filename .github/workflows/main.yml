name: Zedge Ryan Automation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      zedge_email:
        description: "Zedge email"
        required: false
        default: ""
      zedge_password:
        description: "Zedge password"
        required: false
        default: ""
      headless:
        description: "Run headless? true/false"
        required: true
        default: "false"
      total_profiles:
        description: "Number of Zedge profiles to rotate through (e.g. 1, 2, 3, 6)"
        required: false
        default: "3"
      os:
        description: "🖥️ Runner OS"
        required: true
        default: "windows-2025"
        type: choice
        options:
          - windows-2025
          - windows-2022
          - windows-latest
      ua_group:
        description: "🌐 Browser / User-Agent type"
        required: true
        default: "random"
        type: choice
        options:
          - random
          - chrome_windows
          - edge_windows
          - firefox
          - chrome_macos
          - safari_macos
          - android_mobile

jobs:
  automation:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        shell: pwsh
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: 🎲 Randomize Machine Identity
        shell: pwsh
        run: |
          Write-Host "============================================================"
          Write-Host "  🎲  RANDOMIZING MACHINE IDENTITY"
          Write-Host "============================================================"

          # ── 1. Randomize Machine GUID (Windows Registry) ──────────────
          Write-Host ""
          Write-Host "── Machine GUID ─────────────────────────────────────────────"
          try {
            $oldGuid = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Cryptography' -Name MachineGuid).MachineGuid
            Write-Host "Old GUID : $oldGuid"
            $newGuid = [System.Guid]::NewGuid().ToString()
            Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Cryptography' -Name 'MachineGuid' -Value $newGuid
            $verify = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Cryptography' -Name MachineGuid).MachineGuid
            Write-Host "New GUID : $verify"
            Write-Host "✅ Machine GUID randomized successfully"
          } catch {
            Write-Host "⚠️ Machine GUID change failed: $($_.Exception.Message)"
          }

          # ── 2. Randomize MachineId in SQM (telemetry GUID) ───────────
          Write-Host ""
          Write-Host "── SQM / Telemetry GUID ─────────────────────────────────────"
          try {
            $sqmPath = 'HKLM:\SOFTWARE\Microsoft\SQMClient'
            if (Test-Path $sqmPath) {
              $newSqm = [System.Guid]::NewGuid().ToString().ToUpper()
              $newSqm = "{$newSqm}"
              Set-ItemProperty -Path $sqmPath -Name 'MachineId' -Value $newSqm -ErrorAction SilentlyContinue
              Write-Host "✅ SQM MachineId set to: $newSqm"
            } else {
              Write-Host "ℹ️ SQM registry key not present — skipping"
            }
          } catch {
            Write-Host "⚠️ SQM GUID change failed: $($_.Exception.Message)"
          }

          # ── 3. Randomize MAC addresses on physical adapters ───────────
          Write-Host ""
          Write-Host "── MAC Address Randomization ────────────────────────────────"
          $regBase = "HKLM:\SYSTEM\CurrentControlSet\Control\Class\{4D36E972-E325-11CE-BFC1-08002BE10318}"
          $adapters = Get-NetAdapter -Physical -ErrorAction SilentlyContinue |
                      Where-Object { $_.Status -ne "Not Present" }

          if ($adapters) {
            foreach ($adapter in $adapters) {
              try {
                $bytes = 1..6 | ForEach-Object { Get-Random -Minimum 0 -Maximum 255 }
                $bytes[0] = ($bytes[0] -band 0xFE) -bor 0x02
                $macReg     = ($bytes | ForEach-Object { '{0:X2}' -f $_ }) -join ''
                $macDisplay = ($bytes | ForEach-Object { '{0:X2}' -f $_ }) -join '-'

                $keys = Get-ChildItem $regBase -ErrorAction SilentlyContinue
                $found = $false
                foreach ($key in $keys) {
                  $props = Get-ItemProperty $key.PSPath -ErrorAction SilentlyContinue
                  if ($props.NetCfgInstanceId -and $props.NetCfgInstanceId -eq $adapter.InterfaceGuid) {
                    Set-ItemProperty -Path $key.PSPath -Name 'NetworkAddress' -Value $macReg -ErrorAction Stop
                    Write-Host "✅ $($adapter.Name): MAC registry → $macDisplay (active on next cycle)"
                    $found = $true
                    break
                  }
                }
                if (-not $found) {
                  Write-Host "ℹ️ Registry key not found for $($adapter.Name) — trying netsh"
                  $netshMac = $macDisplay.Replace('-', '')
                  netsh interface set interface "$($adapter.Name)" newmac="$netshMac" 2>$null
                  Write-Host "✅ $($adapter.Name): netsh MAC set → $macDisplay"
                }
              } catch {
                Write-Host "⚠️ MAC update skipped for $($adapter.Name): $($_.Exception.Message)"
              }
            }
          } else {
            Write-Host "ℹ️ No physical adapters found — skipping"
          }

          Write-Host ""
          Write-Host "============================================================"
          Write-Host "  ✅  Machine Identity Randomization Complete"
          Write-Host "============================================================"

      - name: Collect Device Info
        shell: pwsh
        run: |
          Write-Host "============================================================"
          Write-Host "  🖥️  GITHUB ACTIONS RUNNER — DEVICE INFORMATION REPORT"
          Write-Host "============================================================"

          # ── OS & Runner ──────────────────────────────────────────────
          Write-Host ""
          Write-Host "── OS & Runner ──────────────────────────────────────────────"
          $os = Get-CimInstance Win32_OperatingSystem
          Write-Host "OS Name        : $($os.Caption)"
          Write-Host "OS Version     : $($os.Version)"
          Write-Host "Build Number   : $($os.BuildNumber)"
          Write-Host "Architecture   : $($os.OSArchitecture)"
          Write-Host "System Drive   : $($os.SystemDrive)"
          Write-Host "Install Date   : $($os.InstallDate)"
          Write-Host "Last Boot      : $($os.LastBootUpTime)"
          Write-Host "Runner Image   : $env:ImageOS / $env:ImageVersion"
          Write-Host "GitHub Runner  : $env:RUNNER_NAME ($env:RUNNER_OS)"
          Write-Host "Runner Arch    : $env:RUNNER_ARCH"
          Write-Host "Runner Temp    : $env:RUNNER_TEMP"
          Write-Host "Runner Tool    : $env:RUNNER_TOOL_CACHE"
          Write-Host "GitHub Region  : $env:GITHUB_SERVER_URL"
          Write-Host "Workflow       : $env:GITHUB_WORKFLOW"
          Write-Host "Run ID         : $env:GITHUB_RUN_ID"
          Write-Host "Run Number     : $env:GITHUB_RUN_NUMBER"
          Write-Host "Job            : $env:GITHUB_JOB"
          Write-Host "Actor          : $env:GITHUB_ACTOR"

          # ── Machine / Computer Identity ───────────────────────────────
          Write-Host ""
          Write-Host "── Machine Identity ─────────────────────────────────────────"
          $cs = Get-CimInstance Win32_ComputerSystem
          Write-Host "Computer Name  : $($cs.Name)"
          Write-Host "Domain / WG    : $($cs.Domain)"
          Write-Host "Manufacturer   : $($cs.Manufacturer)"
          Write-Host "Model          : $($cs.Model)"
          Write-Host "System Type    : $($cs.SystemType)"
          Write-Host "Total RAM (GB) : $([math]::Round($cs.TotalPhysicalMemory / 1GB, 2))"

          try {
            $machineGuid = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Cryptography' -Name MachineGuid -ErrorAction Stop).MachineGuid
            Write-Host "Machine GUID   : $machineGuid"
          } catch {
            Write-Host "Machine GUID   : (unavailable)"
          }

          $bios = Get-CimInstance Win32_BIOS
          Write-Host "BIOS Vendor    : $($bios.Manufacturer)"
          Write-Host "BIOS Version   : $($bios.SMBIOSBIOSVersion)"
          Write-Host "BIOS Serial    : $($bios.SerialNumber)"
          Write-Host "BIOS Release   : $($bios.ReleaseDate)"

          $board = Get-CimInstance Win32_BaseBoard
          Write-Host "Motherboard    : $($board.Manufacturer) — $($board.Product)"
          Write-Host "Board Serial   : $($board.SerialNumber)"

          # ── CPU ───────────────────────────────────────────────────────
          Write-Host ""
          Write-Host "── CPU ──────────────────────────────────────────────────────"
          $cpu = Get-CimInstance Win32_Processor | Select-Object -First 1
          Write-Host "CPU Name       : $($cpu.Name)"
          Write-Host "CPU Cores      : $($cpu.NumberOfCores)"
          Write-Host "Logical CPUs   : $($cpu.NumberOfLogicalProcessors)"
          Write-Host "Max Clock(MHz) : $($cpu.MaxClockSpeed)"
          Write-Host "CPU ID         : $($cpu.ProcessorId)"
          Write-Host "CPU Socket     : $($cpu.SocketDesignation)"
          Write-Host "CPU Arch       : $($cpu.Architecture)"

          # ── RAM Slots ─────────────────────────────────────────────────
          Write-Host ""
          Write-Host "── RAM ──────────────────────────────────────────────────────"
          Get-CimInstance Win32_PhysicalMemory | ForEach-Object {
            Write-Host ("  Slot {0,-6}: {1} GB  {2} MHz  SN={3}" -f $_.DeviceLocator, [math]::Round($_.Capacity/1GB,1), $_.Speed, $_.SerialNumber)
          }

          # ── Network / MAC Addresses ───────────────────────────────────
          Write-Host ""
          Write-Host "── Network Adapters & MAC Addresses ─────────────────────────"
          Get-CimInstance Win32_NetworkAdapterConfiguration |
            Where-Object { $_.MACAddress -ne $null } |
            ForEach-Object {
              Write-Host ("  [{0}] MAC={1}  IP={2}  DHCP={3}" -f $_.Description, $_.MACAddress, ($_.IPAddress -join ', '), $_.DHCPEnabled)
            }

          Write-Host ""
          Write-Host "── Public IP (via ipinfo.io) ─────────────────────────────────"
          try {
            $ipInfo = Invoke-RestMethod -Uri "https://ipinfo.io/json" -TimeoutSec 10
            Write-Host "Public IP      : $($ipInfo.ip)"
            Write-Host "ISP / Org      : $($ipInfo.org)"
            Write-Host "City / Region  : $($ipInfo.city), $($ipInfo.region)"
            Write-Host "Country        : $($ipInfo.country)"
            Write-Host "Timezone       : $($ipInfo.timezone)"
          } catch {
            Write-Host "Public IP      : (lookup failed)"
          }

          # ── Disk ──────────────────────────────────────────────────────
          Write-Host ""
          Write-Host "── Disk Drives ──────────────────────────────────────────────"
          Get-PSDrive -PSProvider FileSystem | ForEach-Object {
            $used = if ($_.Used) { [math]::Round($_.Used/1GB, 2) } else { "N/A" }
            $free = if ($_.Free) { [math]::Round($_.Free/1GB, 2) } else { "N/A" }
            Write-Host ("  Drive {0}: Used={1} GB  Free={2} GB" -f $_.Name, $used, $free)
          }

          Get-CimInstance Win32_DiskDrive | ForEach-Object {
            Write-Host ("  Physical: {0}  Size={1} GB  Serial={2}  Interface={3}" -f $_.Model, [math]::Round($_.Size/1GB,1), $_.SerialNumber, $_.InterfaceType)
          }

          # ── Environment Summary ───────────────────────────────────────
          Write-Host ""
          Write-Host "── Node / NPM / Tools ───────────────────────────────────────"
          node --version
          npm --version
          Write-Host "PowerShell Ver : $($PSVersionTable.PSVersion)"

          Write-Host ""
          Write-Host "============================================================"
          Write-Host "  ✅  Device Info Collection Complete"
          Write-Host "============================================================"

      - name: Create bot.js
        shell: pwsh
        run: |
          @'
          const { chromium } = require("playwright");
          const fs = require("fs");
          const path = require("path");

          const zedgeEmail = process.env.ZEDGE_EMAIL;
          const zedgePassword = process.env.ZEDGE_PASSWORD;
          const isHeadless = process.env.HEADLESS === "true";

          const firebaseDatabaseURL = process.env.FIREBASE_DATABASE_URL || "";
          const queuePath = "wallpaperQueue";

          if (!zedgeEmail) throw new Error("Zedge email is required");
          if (!zedgePassword) throw new Error("Zedge password is required");

          async function firebaseGet(pathName) {
            const res = await fetch(`${firebaseDatabaseURL}/${pathName}.json`);
            if (!res.ok) throw new Error(`Firebase GET failed: ${res.status}`);
            return await res.json();
          }

          async function firebasePatch(pathName, data) {
            const res = await fetch(`${firebaseDatabaseURL}/${pathName}.json`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data)
            });
            if (!res.ok) throw new Error(`Firebase PATCH failed: ${res.status}`);
            return await res.json();
          }

          async function firebaseDelete(pathName) {
            const res = await fetch(`${firebaseDatabaseURL}/${pathName}.json`, {
              method: "DELETE"
            });
            if (!res.ok) throw new Error(`Firebase DELETE failed: ${res.status}`);
            console.log(`Deleted from Firebase: ${pathName}`);
          }

          async function sendFacebookNotification(message) {
            const apikey = process.env.FB_APIKEY || "tXFKSuTupqKZhmRL";
            if (!apikey) {
              console.log("Facebook notification API key not configured. Skipping.");
              return;
            }
            try {
              const url = `https://api.callmebot.com/facebook/send.php?apikey=${encodeURIComponent(apikey)}&text=${encodeURIComponent(message)}`;
              const res = await fetch(url);
              if (!res.ok) {
                console.log(`Facebook API response failed: HTTP ${res.status}`);
              } else {
                console.log("Facebook notification successfully sent.");
              }
            } catch (err) {
              console.log(`Error sending Facebook notification: ${err.message}`);
            }
          }

          // --- PROFILE ROTATION STATE MANAGER ---

          function getNextAvailableProfile(lastUsedIndex, uploadCounts, total, perProfileLimit) {
            let next = (lastUsedIndex + 1) % total;
            for (let i = 0; i < total; i++) {
              if ((uploadCounts[next] || 0) < perProfileLimit) return next;
              next = (next + 1) % total;
            }
            return -1;
          }

          async function getProfileState(totalProfilesCount) {
            console.log("Checking profile rotation state...");
            const today = new Date().toLocaleString("en-US", { timeZone: "Asia/Dhaka" }).split(",")[0];
            let state;
            try {
              state = await firebaseGet("uploadState");
            } catch (e) {
              state = null;
            }

            if (!state) {
              state = {
                lastUploadDate: "",
                totalUploadsToday: 0,
                lastUsedProfileIndex: -1,
                totalProfilesAvailable: totalProfilesCount,
                profileUploadCounts: {}
              };
            }

            state.totalProfilesAvailable = totalProfilesCount;

            if (typeof state.profileUploadCounts !== "object" || Array.isArray(state.profileUploadCounts)) {
              state.profileUploadCounts = {};
            }

            if (state.lastUploadDate !== today) {
              console.log("New day detected! Resetting daily upload count and profile usage.");
              state.lastUploadDate = today;
              state.totalUploadsToday = 0;
              state.profileUploadCounts = {};
            }

            const ZEDGE_DAILY_LIMIT = 3;
            if (state.totalUploadsToday >= ZEDGE_DAILY_LIMIT) {
              console.log(`🛑 Zedge daily limit of ${ZEDGE_DAILY_LIMIT} uploads reached. Exiting safely.`);
              process.exit(0); 
            }

            const perProfileLimit = Math.ceil(ZEDGE_DAILY_LIMIT / totalProfilesCount);
            const nextProfileIndex = getNextAvailableProfile(state.lastUsedProfileIndex, state.profileUploadCounts, totalProfilesCount, perProfileLimit);

            if (nextProfileIndex === -1) {
              console.log("🛑 All profiles have reached their daily upload limit. Exiting safely.");
              process.exit(0);
            }

            const countsDisplay = Object.entries(state.profileUploadCounts).map(([k,v]) => `P${k}:${v}`).join(", ") || "none";
            console.log(`Upload counts today: {${countsDisplay}} | Per-profile limit: ${perProfileLimit} | Next: ${nextProfileIndex}`);
            return { state, nextProfileIndex, perProfileLimit };
          }

          async function updateProfileStateAfterUpload(state, usedProfileIndex) {
            console.log(`Updating state: Profile ${usedProfileIndex} was used. Total today is now ${state.totalUploadsToday + 1}`);
            const profileUploadCounts = { ...(state.profileUploadCounts || {}) };
            profileUploadCounts[usedProfileIndex] = (profileUploadCounts[usedProfileIndex] || 0) + 1;

            await firebasePatch("uploadState", {
              lastUploadDate: state.lastUploadDate,
              totalUploadsToday: state.totalUploadsToday + 1,
              lastUsedProfileIndex: usedProfileIndex,
              totalProfilesAvailable: state.totalProfilesAvailable,
              profileUploadCounts
            });
          }

          function getDayTypeToday() {
            const SCHEDULE_START = parseInt(process.env.SCHEDULE_START || "0", 10);
            if (!SCHEDULE_START) return null;
            const now = new Date();
            const dhakaNow = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Dhaka" }));
            dhakaNow.setHours(0, 0, 0, 0);
            const dhakaStart = new Date(new Date(SCHEDULE_START).toLocaleString("en-US", { timeZone: "Asia/Dhaka" }));
            dhakaStart.setHours(0, 0, 0, 0);
            const diff = Math.floor((dhakaNow - dhakaStart) / 86400000) + 1;
            console.log(`Day calculation: Dhaka now=${dhakaNow.toISOString()}, start=${dhakaStart.toISOString()}, diff=${diff}`);
            return diff % 2 === 1 ? "ringtone" : "wallpaper";
          }

          async function getNextWallpaperFromRealtimeDB() {
            console.log("Checking Firebase Realtime Database queue...");
            const data = await firebaseGet(queuePath);
            if (!data) throw new Error("No items found in Realtime Database");

            const dayType = getDayTypeToday();
            console.log(`Today is Day type: ${dayType || "any (no schedule set)"}`);

            const entries = Object.entries(data)
              .filter(([id, item]) => {
                if (!item || item.status !== "queued") return false;
                if (!item.fileBase64 && !item.imageBase64 && !item.imageUrl) return false;
                if (dayType) {
                  const isMp3 = item.isMp3 || (item.name && item.name.toLowerCase().endsWith(".mp3"));
                  const itemType = isMp3 ? "ringtone" : "wallpaper";
                  if (itemType !== dayType) return false;
                }
                return true;
              })
              .sort((a, b) => (a[1].createdAt || 0) - (b[1].createdAt || 0));

            if (!entries.length) throw new Error(`No queued ${dayType || "item"} found`);

            const [id, item] = entries[0];
            const localDir = path.join(process.cwd(), "downloads");
            fs.mkdirSync(localDir, { recursive: true });
            
            const isMp3 = item.isMp3 || (item.name && item.name.toLowerCase().endsWith(".mp3"));
            const ext = isMp3 ? ".mp3" : ".jpg";
            const localFile = path.join(localDir, `${id}${ext}`);

            console.log(`Saving queued item: ${item.name || id} as ${ext}`);

            if (item.imageUrl) {
              console.log(`Downloading from R2: ${item.imageUrl}`);
              const https = require("https");
              const http = require("http");
              const fetchUrl = item.imageUrl;
              const downloader = fetchUrl.startsWith("https") ? https : http;
              await new Promise((resolve, reject) => {
                downloader.get(fetchUrl, (res) => {
                  if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                    const redir = res.headers.location;
                    const redirDownloader = redir.startsWith("https") ? https : http;
                    redirDownloader.get(redir, (res2) => {
                      const chunks = [];
                      res2.on("data", c => chunks.push(c));
                      res2.on("end", () => { fs.writeFileSync(localFile, Buffer.concat(chunks)); resolve(); });
                      res2.on("error", reject);
                    }).on("error", reject);
                  } else {
                    const chunks = [];
                    res.on("data", c => chunks.push(c));
                    res.on("end", () => { fs.writeFileSync(localFile, Buffer.concat(chunks)); resolve(); });
                    res.on("error", reject);
                  }
                }).on("error", reject);
              });
            } else {
              const base64Data = item.fileBase64 || item.imageBase64;
              const base64 = base64Data.includes(",")
                ? base64Data.split(",")[1]
                : base64Data;
              fs.writeFileSync(localFile, Buffer.from(base64, "base64"));
            }

            await firebasePatch(`${queuePath}/${id}`, {
              status: "processing",
              processingAt: Date.now()
            });

            return {
              id,
              localFile,
              isMp3,
              name:        item.name || id,
              title:       item.title || "",
              tags:        item.tags || "",
              category:    item.category || "",
              description: item.description || "",
              r2Urls:      item.r2Urls || []
            };
          }

          async function markWallpaperDoneAndDelete(id, name, itemType, r2Urls) {
            console.log(`Upload successful — recording & deleting "${name}"...`);

            const histPath = "scheduleHistory";
            const histEntry = {
              title: name,
              type: itemType || "wallpaper",
              count: 1,
              timestamp: Date.now()
            };
            await fetch(`${firebaseDatabaseURL}/${histPath}.json`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(histEntry)
            });
            console.log(`History recorded: "${name}" [${itemType}]`);

            await firebaseDelete(`${queuePath}/${id}`);
            console.log(`"${name}" removed from Firebase queue`);

            try {
              const libData = await firebaseGet("contentLibrary");
              if (libData) {
                for (const [libId, libItem] of Object.entries(libData)) {
                  if (libItem && libItem.name === name) {
                    await firebaseDelete(`contentLibrary/${libId}`);
                    console.log(`"${name}" removed from contentLibrary`);
                    break;
                  }
                }
              }
            } catch (e) { console.log(`Library cleanup skip: ${e.message}`); }

            const R2_WORKERS = [
              { name: "ryan", url: "https://broken-recipe-97d5.monjurulgd2001.workers.dev/" }
            ];
            for (const r2 of r2Urls) {
              const worker = R2_WORKERS.find(w => w.name === r2.worker);
              if (!worker) continue;
              try {
                const keyMatch = r2.url.match(/uploads\/(.+)$/);
                if (keyMatch) {
                  const key = "uploads/" + keyMatch[1];
                  await fetch(worker.url, {
                    method: "DELETE",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ key })
                  });
                  console.log(`R2 deleted (${worker.name}): ${key}`);
                }
              } catch (e) { console.log(`R2 delete skip (${worker.name}): ${e.message}`); }
            }
          }

          async function markWallpaperFailed(id, error) {
            await firebasePatch(`${queuePath}/${id}`, {
              status: "failed",
              error: String(error).slice(0, 1000),
              failedAt: Date.now()
            });
          }

          async function getProxyTimezone(browser) {
            const providers = [
              { url: "https://ipwho.is/", parse: d => d.timezone?.id },
              { url: "https://ipinfo.io/json", parse: d => d.timezone },
              { url: "http://ip-api.com/json", parse: d => d.timezone }
            ];

            for (const provider of providers) {
              let ctx;
              try {
                ctx = await browser.newContext({ ignoreHTTPSErrors: true });
                const page = await ctx.newPage();
                console.log(`Checking timezone via ${provider.url}`);
                await page.goto(provider.url, { waitUntil: "domcontentloaded" });
                const text = await page.locator("body").innerText();
                if (!text || !text.trim().startsWith("{")) throw new Error("Response is not JSON");
                const data = JSON.parse(text);
                const tz = provider.parse(data);
                if (!tz) throw new Error("No timezone found");
                await ctx.close();
                console.log(`Detected timezone: ${tz}`);
                return tz;
              } catch (err) {
                console.log(`Timezone provider failed: ${err.message}`);
                if (ctx) await ctx.close().catch(() => {});
              }
            }

            console.log("Using fallback timezone: Asia/Dhaka");
            return "Asia/Dhaka";
          }

          async function safeClick(locator, label, timeout = 30000) {
            console.log(`Clicking ${label}`);
            await locator.waitFor({ state: "visible", timeout });
            await locator.scrollIntoViewIfNeeded();
            await locator.click();
          }

          async function safeType(locator, value, label) {
            console.log(`Typing ${label}`);
            await locator.waitFor({ state: "visible" });
            await locator.scrollIntoViewIfNeeded();
            await locator.click();
            await locator.fill("");
            await locator.pressSequentially(value, { delay: 90 });
          }

          async function scrollFullPage(page) {
            await page.evaluate(async () => {
              await new Promise(resolve => {
                let lastY = -1;
                const step = () => {
                  window.scrollBy(0, 500);
                  if (window.scrollY === lastY || window.scrollY + window.innerHeight >= document.body.scrollHeight) {
                    resolve();
                    return;
                  }
                  lastY = window.scrollY;
                  requestAnimationFrame(step);
                };
                step();
              });
            });
          }

          async function scrollToElement(locator) {
            await locator.waitFor({ state: "attached" });
            await locator.evaluate(el => {
              el.scrollIntoView({ block: "center", inline: "center" });
            });
          }

          async function forceCheckByDataHook(page, dataHookValue, label) {
            console.log(`Force checking: ${label}`);

            await page.waitForSelector(
              `input[data-hook="${dataHookValue}-input"]`,
              { state: "attached", timeout: 30000 }
            );

            await page.evaluate((hook) => {
              const input = document.querySelector(`input[data-hook="${hook}-input"]`);
              if (!input) throw new Error(`Checkbox input not found: ${hook}`);
              input.click();
            }, dataHookValue);

            const isChecked = await page.evaluate((hook) => {
              const input = document.querySelector(`input[data-hook="${hook}-input"]`);
              return input ? input.checked : false;
            }, dataHookValue);

            if (!isChecked) {
              console.log(`${label} not checked after click — forcing via JS property`);
              await page.evaluate((hook) => {
                const input = document.querySelector(`input[data-hook="${hook}-input"]`);
                if (!input) throw new Error(`Checkbox input not found: ${hook}`);
                const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
                  window.HTMLInputElement.prototype, "checked"
                ).set;
                nativeInputValueSetter.call(input, true);
                input.dispatchEvent(new Event("click", { bubbles: true }));
                input.dispatchEvent(new Event("change", { bubbles: true }));
                input.dispatchEvent(new MouseEvent("mousedown", { bubbles: true }));
                input.dispatchEvent(new MouseEvent("mouseup", { bubbles: true }));
              }, dataHookValue);
            }

            const finalChecked = await page.evaluate((hook) => {
              const input = document.querySelector(`input[data-hook="${hook}-input"]`);
              return input ? input.checked : false;
            }, dataHookValue);

            if (!finalChecked) throw new Error(`Failed to check checkbox: ${label}`);
            console.log(`${label} confirmed checked`);
          }

